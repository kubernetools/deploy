name: PR check

on:
  pull_request:

permissions:
  contents: read

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Download site release
        run: |
          gh release download \
            --repo kubernetools/site \
            --pattern "*.tgz" \
            --dir site-release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract site
        run: |
          mkdir -p site
          tar -xzf site-release/*.tgz --strip-components=1 -C site

      - name: Detect site versions
        id: render-config
        run: |
          versions=$(ls site/docs/ | grep -E '^v[0-9]+\.[0-9]+$' | sort -V)
          latest=$(echo "$versions" | tail -1)
          older=$(echo "$versions" | tail -2 | head -1)
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "older=$older"   >> "$GITHUB_OUTPUT"

      - name: Build image
        run: podman build --tag kubernetools-pr-test --build-arg SITE_VERSION=pr-check .

      - name: Run integration tests
        env:
          LATEST_K8S_VERSION: ${{ steps.render-config.outputs.latest }}
          OLDER_K8S_VERSION: ${{ steps.render-config.outputs.older }}
        run: |
          podman run -d --rm --name nginx-test -p 8080:8080 kubernetools-pr-test
          until curl -sf -H "Host: www.kubernetools.com" http://localhost:8080/ -o /dev/null; do sleep 1; done
          bash tests/run-tests.sh

      - name: Stop container
        if: always()
        run: podman stop nginx-test || true
