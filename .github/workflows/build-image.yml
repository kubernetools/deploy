name: Build and push container image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kubernetools/deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Download site release
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo kubernetools/site \
            --pattern "*.tgz" \
            --dir site-release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract site
        run: |
          mkdir -p site
          tar -xzf site-release/*.tgz --strip-components=1 -C site

      - name: Render nginx config
        run: |
          latest=$(ls site/docs/ | grep -E '^v[0-9]+\.[0-9]+$' | sort -V | tail -1)
          sed -i "s|__LATEST_K8S_VERSION__|${latest}|g" nginx.conf

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SITE_VERSION=${{ github.ref_name }}
