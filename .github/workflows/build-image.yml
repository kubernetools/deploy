name: Build and push container image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kubernetools/deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download site release
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo kubernetools/site \
            --pattern "*.tgz" \
            --dir site-release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract site
        run: |
          mkdir -p site
          tar -xzf site-release/*.tgz --strip-components=1 -C site

      - name: Detect latest Kubernetes version
        id: k8s-version
        run: |
          latest=$(ls site/docs/ | grep -E '^v[0-9]+\.[0-9]+$' | sort -V | tail -1)
          echo "LATEST_K8S_VERSION=$latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a986b4db68145e8e9dd4191  # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SITE_VERSION=${{ github.ref_name }}
            LATEST_K8S_VERSION=${{ steps.k8s-version.outputs.LATEST_K8S_VERSION }}
