name: Build and push container image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      site_version:
        description: 'Site release tag to download from kubernetools/site (e.g. v0.1.1)'
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kubernetools/deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Download site release
        run: |
          gh release download "${{ inputs.site_version || github.ref_name }}" \
            --repo kubernetools/site \
            --pattern "*.tgz" \
            --dir site-release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract site
        run: |
          mkdir -p site
          tar -xzf site-release/*.tgz --strip-components=1 -C site

      - name: Detect site versions
        id: render-config
        run: |
          versions=$(ls site/docs/ | grep -E '^v[0-9]+\.[0-9]+$' | sort -V)
          latest=$(echo "$versions" | tail -1)
          older=$(echo "$versions" | tail -2 | head -1)
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "older=$older"   >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build image
        run: |
          tags_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && tags_args+=(--tag "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"
          label_args=()
          while IFS= read -r label; do
            [[ -n "$label" ]] && label_args+=(--label "$label")
          done <<< "${{ steps.meta.outputs.labels }}"
          podman build "${tags_args[@]}" "${label_args[@]}" \
            --build-arg SITE_VERSION=${{ github.ref_name }} .

      - name: Run integration tests
        env:
          LATEST_K8S_VERSION: ${{ steps.render-config.outputs.latest }}
          OLDER_K8S_VERSION: ${{ steps.render-config.outputs.older }}
        run: |
          image=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          podman run -d --rm --name nginx-test -p 8080:8080 "$image"
          until curl -sf -H "Host: www.kubernetools.com" http://localhost:8080/ -o /dev/null; do sleep 1; done
          bash tests/run-tests.sh

      - name: Stop container
        if: always()
        run: podman stop nginx-test || true

      - name: Push image
        run: |
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && podman push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
