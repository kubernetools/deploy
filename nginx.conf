worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;

    sendfile   on;
    tcp_nopush on;

    # Serve pre-compressed .gz files when the client accepts gzip
    gzip_static on;

    server {
        listen      8080 default_server;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # /docs/latest[/] → current latest Kubernetes version (substituted at image build time)
        location ~* ^/docs/latest/?$ {
            return 302 /docs/__LATEST_K8S_VERSION__/;
        }

        # Versioned k8s docs — daily revalidation; content is stable per k8s version
        # but site releases can re-publish the same URL with bug fixes
        location ~* ^/docs/v[0-9]+\.[0-9]+/ {
            add_header Cache-Control "max-age=86400";
            try_files $uri $uri/ $uri/index.html =404;
        }

        # Index pages and everything else — always revalidate
        location / {
            add_header Cache-Control "no-cache";
            try_files $uri $uri/ $uri/index.html =404;
        }
    }
}
