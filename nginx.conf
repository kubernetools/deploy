worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;

    sendfile   on;
    tcp_nopush on;

    # Serve pre-compressed .gz files when the client accepts gzip
    gzip_static on;

    server {
        listen      8080;
        server_name kubernetools.com;
        return 301 https://www.kubernetools.com$request_uri;
    }

    server {
        listen      8080 default_server;
        server_name www.kubernetools.com;

        absolute_redirect off;

        root  /usr/share/nginx/html;
        index index.html;

        # /docs/latest/ — physical directory; indexed by search engines
        location /docs/latest/ {
            add_header Cache-Control "max-age=86400" always;
            try_files $uri $uri/ $uri/index.html =404;
        }

        # Versioned k8s docs — noindex; canonical points to /docs/latest/
        location ~* ^/docs/v[0-9]+\.[0-9]+/ {
            add_header X-Robots-Tag "noindex" always;
            add_header Cache-Control "max-age=86400" always;
            try_files $uri $uri/ $uri/index.html =404;
        }

        # Index pages and everything else
        location / {
            add_header Cache-Control "max-age=86400";
            try_files $uri $uri/ $uri/index.html =404;
        }
    }
}
